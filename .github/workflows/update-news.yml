name: 自动更新资讯（Competitor + VOS）

on:
  schedule:
    # 每天 UTC 8:00（北京时间 16:00）运行
    - cron: '0 8 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 抓取竞对资讯
        run: python scripts/fetch-news.py

      - name: 注入竞对资讯到 script.js
        run: python scripts/inject-news.py

      - name: 抓取VOS卖家热议
        run: python scripts/fetch-vos.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news-data.json script.js vos-data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: 更新Competitor资讯+VOS卖家热议 $(date +%Y-%m-%d)"
            git push
          fi
