<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容管理助手</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #007cba; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 4px; cursor: pointer; }
        .output { background: #f5f5f5; padding: 1rem; border-radius: 4px; margin-top: 1rem; }
        .copy-btn { background: #28a745; margin-left: 1rem; }
    </style>
</head>
<body>
    <h1>📝 内容添加助手</h1>
    <p>填写表单，自动生成代码，复制粘贴到GitHub即可！</p>

    <form id="contentForm">
        <div class="form-group">
            <label>内容类型:</label>
            <select id="type">
                <option value="flash">Bi-monthly Flash</option>
                <option value="reports">Deep Research</option>
            </select>
        </div>

        <div class="form-group">
            <label>标题:</label>
            <input type="text" id="title" placeholder="例: 2025年XX月双月度Competitor Study Flash">
        </div>

        <div class="form-group">
            <label>日期:</label>
            <input type="date" id="date">
        </div>

        <div class="form-group">
            <label>简短描述:</label>
            <textarea id="summary" rows="3" placeholder="简短描述内容..."></textarea>
        </div>

        <div class="form-group">
            <label>标签 (用逗号分隔):</label>
            <input type="text" id="tags" placeholder="双月报告, 竞争分析, 其他标签">
        </div>

        <div class="form-group">
            <label>SharePoint 链接:</label>
            <input type="url" id="fileUrl" placeholder="https://amazon.sharepoint.com/...">
        </div>

        <button type="button" onclick="generateCode()">生成代码</button>
    </form>

    <div id="output" class="output" style="display:none;">
        <h3>生成的代码:</h3>
        <pre id="codeOutput"></pre>
        <button class="copy-btn" onclick="copyCode()">复制代码</button>
        <p><strong>使用方法:</strong> 复制上面的代码，粘贴到GitHub的script.js文件对应位置</p>
    </div>

    <script>
        function generateCode() {
            const type = document.getElementById('type').value;
            const title = document.getElementById('title').value;
            const date = document.getElementById('date').value;
            const summary = document.getElementById('summary').value;
            const tags = document.getElementById('tags').value.split(',').map(t => t.trim());
            const fileUrl = document.getElementById('fileUrl').value;
            
            const id = Math.floor(Math.random() * 1000) + 10; // 随机ID
            
            const code = `{
    id: ${id},
    title: "${title}",
    date: "${date}",
    summary: "${summary}",
    tags: [${tags.map(tag => `"${tag}"`).join(', ')}],
    url: "${fileUrl}",
    internal: true
},`;
            
            document.getElementById('codeOutput').textContent = code;
            document.getElementById('output').style.display = 'block';
        }
        
        function copyCode() {
            const code = document.getElementById('codeOutput').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('代码已复制到剪贴板！');
            });
        }
        
        // 设置默认日期为今天
        document.getElementById('date').valueAsDate = new Date();
    </script>
</body>
</html>
